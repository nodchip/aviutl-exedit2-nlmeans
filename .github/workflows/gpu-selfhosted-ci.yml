name: GPU Self-Hosted CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

jobs:
  gpu-quality-windows:
    runs-on:
      - self-hosted
      - windows
      - gpu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Check GPU Runner Prerequisites
        shell: cmd
        run: scripts\check_gpu_runner_prereq.cmd

      - name: Generate GPU Runner Health Report
        shell: cmd
        run: scripts\generate_gpu_runner_health_report.cmd

      - name: Generate DX12 PoC Readiness Report
        shell: cmd
        run: scripts\generate_dx12_poc_report.cmd

      - name: Build Release Win32
        shell: cmd
        run: >
          MSBuild.exe nlmeans_filter.sln
          /p:Configuration=Release
          /p:Platform=Win32
          /m:1

      - name: Run GoogleTest Suite
        shell: cmd
        run: scripts\run_gtests.cmd

      - name: Generate NLM Variants Benchmark Report
        shell: cmd
        run: scripts\generate_nlm_variants_report.cmd

      - name: Generate GPU Coop Benchmark Report
        shell: cmd
        run: scripts\generate_gpu_coop_report.cmd

      - name: Update GPU Coop History CSV
        shell: cmd
        run: scripts\update_gpu_coop_history.cmd

      - name: Check GPU Coop Regression Threshold
        shell: cmd
        run: scripts\check_gpu_coop_regression.cmd

      - name: Check GPU Coop Async Efficiency
        shell: cmd
        run: scripts\check_gpu_coop_async_efficiency.cmd

      - name: Upload GPU Reports
        uses: actions/upload-artifact@v4
        with:
          name: gpu-selfhosted-reports
          path: |
            docs/reports/nlm-variants-benchmark.md
            docs/reports/gpu-coop-benchmark.md
            docs/reports/gpu-coop-history.csv
            docs/reports/gpu-runner-health.md
            docs/reports/dx12-poc-readiness.md
