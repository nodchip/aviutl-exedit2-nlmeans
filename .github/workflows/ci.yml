name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Build Release Win32
        shell: cmd
        run: >
          MSBuild.exe nlmeans_filter.sln
          /p:Configuration=Release
          /p:Platform=Win32
          /m:1

      - name: Run Cache Sizing Unit Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\CacheSizingTests.cpp /Fe:CacheSizingTests.exe
          && CacheSizingTests.exe

      - name: Run NLM Kernel Unit Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\NlmKernelTests.cpp /Fe:NlmKernelTests.exe
          && NlmKernelTests.exe

      - name: Run NLM Frame Reference Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\NlmFrameReferenceTests.cpp /Fe:NlmFrameReferenceTests.exe
          && NlmFrameReferenceTests.exe

      - name: Run NLM Frame Output Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\NlmFrameOutputTests.cpp /Fe:NlmFrameOutputTests.exe
          && NlmFrameOutputTests.exe

      - name: Run NLM Frame Output Multi-Case Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\NlmFrameOutputMultiCaseTests.cpp /Fe:NlmFrameOutputMultiCaseTests.exe
          && NlmFrameOutputMultiCaseTests.exe

      - name: Run Processor CPU/AVX2 Parity Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter
          nlmeans_filter\tests\ProcessorParityTests.cpp
          nlmeans_filter\ProcessorCpu.cpp
          nlmeans_filter\ProcessorAvx2.cpp
          /Fe:ProcessorParityTests.exe
          && ProcessorParityTests.exe

      - name: Run Processor CPU/AVX2 Parity Multi-Case Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter
          nlmeans_filter\tests\ProcessorParityMultiCaseTests.cpp
          nlmeans_filter\ProcessorCpu.cpp
          nlmeans_filter\ProcessorAvx2.cpp
          /Fe:ProcessorParityMultiCaseTests.exe
          && ProcessorParityMultiCaseTests.exe
