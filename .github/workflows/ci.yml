name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Build Release Win32
        shell: cmd
        run: >
          MSBuild.exe nlmeans_filter.sln
          /p:Configuration=Release
          /p:Platform=Win32
          /m:1

      - name: Run NLM Kernel Unit Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\NlmKernelTests.cpp /Fe:NlmKernelTests.exe
          && NlmKernelTests.exe

      - name: Run NLM Frame Reference Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\NlmFrameReferenceTests.cpp /Fe:NlmFrameReferenceTests.exe
          && NlmFrameReferenceTests.exe

      - name: Run NLM Frame Output Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\NlmFrameOutputTests.cpp /Fe:NlmFrameOutputTests.exe
          && NlmFrameOutputTests.exe

      - name: Run NLM Frame Output Multi-Case Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\NlmFrameOutputMultiCaseTests.cpp /Fe:NlmFrameOutputMultiCaseTests.exe
          && NlmFrameOutputMultiCaseTests.exe

      - name: Run Backend Selection Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\BackendSelectionTests.cpp /Fe:BackendSelectionTests.exe
          && BackendSelectionTests.exe

      - name: Run GPU Fallback Policy Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\GpuFallbackPolicyTests.cpp /Fe:GpuFallbackPolicyTests.exe
          && GpuFallbackPolicyTests.exe

      - name: Run Processing Route Policy Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\ProcessingRoutePolicyTests.cpp /Fe:ProcessingRoutePolicyTests.exe
          && ProcessingRoutePolicyTests.exe

      - name: Run Mode IDs Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\ModeIdsTests.cpp /Fe:ModeIdsTests.exe
          && ModeIdsTests.exe

      - name: Run Video Processing Dispatcher Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\VideoProcessingDispatcherTests.cpp /Fe:VideoProcessingDispatcherTests.exe
          && VideoProcessingDispatcherTests.exe

      - name: Run UI Selection Route Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\UiSelectionRouteTests.cpp /Fe:UiSelectionRouteTests.exe
          && UiSelectionRouteTests.exe

      - name: Run UI To Dispatcher Integration Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\UiToDispatcherIntegrationTests.cpp /Fe:UiToDispatcherIntegrationTests.exe
          && UiToDispatcherIntegrationTests.exe

      - name: Run GPU Fallback Execution Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\GpuFallbackExecutionTests.cpp /Fe:GpuFallbackExecutionTests.exe
          && GpuFallbackExecutionTests.exe

      - name: Run GPU Runner Dispatch Test
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc /I nlmeans_filter nlmeans_filter\tests\GpuRunnerDispatchTests.cpp /Fe:GpuRunnerDispatchTests.exe
          && GpuRunnerDispatchTests.exe

      - name: Run GoogleTest Suite
        shell: cmd
        run: >
          cl /nologo /utf-8 /EHsc
          /std:c++17
          /I third_party\googletest\googletest\include
          /I third_party\googletest\googletest
          /I nlmeans_filter
          third_party\googletest\googletest\src\gtest-all.cc
          third_party\googletest\googletest\src\gtest_main.cc
          nlmeans_filter\tests\ExecutionPolicyTests.cpp
          nlmeans_filter\tests\GpuAdapterSelectionTests.cpp
          nlmeans_filter\tests\ModeIdsGoogleTest.cpp
          /Fe:GoogleTests.exe
          && GoogleTests.exe
