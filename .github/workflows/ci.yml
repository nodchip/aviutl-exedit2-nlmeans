name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Build Release Win32
        shell: cmd
        run: >
          MSBuild.exe nlmeans_filter.sln
          /p:Configuration=Release
          /p:Platform=Win32
          /m:1

      - name: Run GoogleTest Suite
        shell: cmd
        run: scripts\run_gtests.cmd

      - name: Generate NLM Variants Benchmark Report
        shell: cmd
        run: scripts\generate_nlm_variants_report.cmd

      - name: Generate DX11 DX12 Benchmark Report
        shell: cmd
        run: scripts\generate_dx11_dx12_benchmark.cmd

      - name: Check DX11 DX12 Benchmark Threshold
        shell: cmd
        run: scripts\check_dx11_dx12_benchmark_threshold.cmd

      - name: Check DX11 DX12 Adoption Gate (Informational)
        shell: cmd
        continue-on-error: true
        run: scripts\check_dx11_dx12_adoption_gate.cmd

      - name: Generate DX11 DX12 Decision Report
        shell: cmd
        run: scripts\generate_dx11_dx12_decision_report.cmd

      - name: Upload Benchmark Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nlm-variants-benchmark
          path: docs/reports/nlm-variants-benchmark.md

      - name: Upload DX11 DX12 Benchmark Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dx11-dx12-benchmark
          path: docs/reports/dx11-dx12-benchmark.md

      - name: Upload DX11 DX12 Decision Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dx11-dx12-decision
          path: docs/reports/dx11-dx12-decision.md

      - name: Generate GPU Coop Benchmark Report
        shell: cmd
        run: scripts\generate_gpu_coop_report.cmd

      - name: Upload GPU Coop Benchmark Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-coop-benchmark
          path: docs/reports/gpu-coop-benchmark.md
