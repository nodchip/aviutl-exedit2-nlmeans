name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure AviUtl2 SDK availability
        id: ensure_sdk
        shell: pwsh
        env:
          AVIUTL2_SDK_URL_VAR: ${{ vars.AVIUTL2_SDK_URL }}
          AVIUTL2_SDK_URL_SECRET: ${{ secrets.AVIUTL2_SDK_URL }}
        run: |
          $sdkHeader = "nlmeans_filter/aviutl2_sdk/filter2.h"
          if (Test-Path $sdkHeader) {
            "sdk_available=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "AviUtl2 SDK found."
            exit 0
          }

          $sdkUrl = $env:AVIUTL2_SDK_URL_VAR
          if ([string]::IsNullOrWhiteSpace($sdkUrl)) {
            $sdkUrl = $env:AVIUTL2_SDK_URL_SECRET
          }
          if ([string]::IsNullOrWhiteSpace($sdkUrl)) {
            "sdk_available=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "AviUtl2 SDK URL is not configured. Release x64 plugin build will be skipped."
            exit 0
          }

          $zipPath = Join-Path $env:RUNNER_TEMP "aviutl2_sdk.zip"
          $extractRoot = Join-Path $env:RUNNER_TEMP "aviutl2_sdk_extract"
          if (Test-Path $extractRoot) {
            Remove-Item -Recurse -Force $extractRoot
          }

          Write-Host "Downloading AviUtl2 SDK from configured URL."
          Invoke-WebRequest -Uri $sdkUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractRoot -Force

          $header = Get-ChildItem -Path $extractRoot -Recurse -Filter "filter2.h" -File | Select-Object -First 1
          if (-not $header) {
            "sdk_available=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "Downloaded SDK archive does not contain filter2.h. Release x64 plugin build will be skipped."
            exit 0
          }

          $headerDir = Split-Path -Parent $header.FullName
          New-Item -ItemType Directory -Path "nlmeans_filter/aviutl2_sdk" -Force | Out-Null
          Get-ChildItem -Path $headerDir -File | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination "nlmeans_filter/aviutl2_sdk" -Force
          }

          if (Test-Path $sdkHeader) {
            "sdk_available=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "AviUtl2 SDK downloaded and extracted."
          } else {
            "sdk_available=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "AviUtl2 SDK extraction failed. Release x64 plugin build will be skipped."
          }

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Release x64
        if: steps.ensure_sdk.outputs.sdk_available == 'true'
        shell: cmd
        run: >
          MSBuild.exe nlmeans_filter.sln
          /p:Configuration=Release
          /p:Platform=x64
          /m:1

      - name: Run GoogleTest Suite
        shell: cmd
        run: scripts\run_gtests.cmd

      - name: Generate NLM Variants Benchmark Report
        shell: cmd
        run: scripts\generate_nlm_variants_report.cmd

      - name: Generate GPU Variants Benchmark Report
        shell: cmd
        run: scripts\generate_gpu_variants_report.cmd

      - name: Upload Benchmark Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nlm-variants-benchmark
          path: docs/reports/nlm-variants-benchmark.md

      - name: Upload GPU Variants Benchmark Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-variants-benchmark
          path: docs/reports/gpu-variants-benchmark.md

      - name: Upload ExEdit2 E2E Status Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exedit2-e2e-status
          path: docs/reports/exedit2-e2e-status.md

      - name: Run GPU Coop Decision Workflow
        shell: cmd
        run: scripts\run_gpu_coop_decision_workflow.cmd

      - name: Generate Remake Remaining Tasks Report
        if: always()
        shell: cmd
        run: scripts\generate_remake_remaining_tasks_report.cmd

      - name: Upload GPU Coop Benchmark Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-coop-benchmark
          path: docs/reports/gpu-coop-benchmark.md

      - name: Upload GPU Coop Decision Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-coop-decision
          path: docs/reports/gpu-coop-decision.md

      - name: Upload Remake Remaining Tasks Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remake-remaining-tasks
          path: docs/reports/remake-remaining-tasks.md
